<mat-toolbar *ngIf="verificar()">

  <!-- LOGO / HOME -->
  <button mat-button [routerLink]="['/homes']" class="brand">
    <mat-icon>favorite</mat-icon>
    <span class="brand-name">Vitality</span>
  </button>

  <span class="spacer"></span>

  <!-- MODO MÓVIL: un solo botón hamburguesa -->
  <ng-container *ngIf="isMobile">
    <button mat-icon-button [matMenuTriggerFor]="menuMobile" aria-label="Menú">
      <mat-icon>menu</mat-icon>
    </button>
  </ng-container>

  <!-- MODO DESKTOP: botones individuales -->
  <ng-container *ngIf="!isMobile">
    <button mat-button [matMenuTriggerFor]="menuUsers" *ngIf="isAdmin()"><mat-icon>group</mat-icon> Usuarios</button>
    <button mat-button [matMenuTriggerFor]="menuCategory" *ngIf="isAdmin()"><mat-icon>category</mat-icon> Categorías</button>
    <button mat-button [matMenuTriggerFor]="menuRole" *ngIf="isAdmin()"><mat-icon>admin_panel_settings</mat-icon> Roles</button>
    <button mat-button [matMenuTriggerFor]="menuProduct" *ngIf="isAdmin()"><mat-icon>shopping_bag</mat-icon> Productos</button>
    <button mat-button [matMenuTriggerFor]="menuSpeciality" *ngIf="isAdmin()"><mat-icon>medical_services</mat-icon> Especialidades</button>
    <button mat-button [matMenuTriggerFor]="menuHealthObjective" *ngIf="isAdmin() || isProfesional() || isCliente()"><mat-icon>fitness_center</mat-icon> Objetivos de Salud</button>
    <button mat-button [matMenuTriggerFor]="menuMonitoring" *ngIf="isProfesional()"><mat-icon>track_changes</mat-icon> Seguimientos</button>
    <button mat-button [matMenuTriggerFor]="menuShopping" *ngIf="isCliente() || isAdmin()"><mat-icon>shopping_cart</mat-icon> Compras</button>
    <button mat-button [matMenuTriggerFor]="menuShoppingDetail" *ngIf="isCliente() || isAdmin()"><mat-icon>receipt_long</mat-icon> Detalles de Compras</button>
    <button mat-button [matMenuTriggerFor]="menuReview" *ngIf="isCliente()"><mat-icon>rate_review</mat-icon> Reseñas</button>
    <button mat-button [matMenuTriggerFor]="menuQuestion" *ngIf="isAdmin() || isProfesional()"><mat-icon>question_answer</mat-icon> Preguntas</button>
    <button mat-button [matMenuTriggerFor]="menuAnswer" *ngIf="isCliente() || isAdmin()"><mat-icon>reply</mat-icon> Respuestas</button>
    <button mat-button [matMenuTriggerFor]="menuRecommendation" *ngIf="isCliente()"><mat-icon>recommend</mat-icon> Recomendaciones</button>
    <button mat-button [matMenuTriggerFor]="menuSalir"><mat-icon>person</mat-icon> Perfil</button>
  </ng-container>

</mat-toolbar>

<!-- MENÚ MÓVIL (hamburguesa) -->
<mat-menu #menuMobile="matMenu">
  <button mat-menu-item [routerLink]="['/homes']"><mat-icon>home</mat-icon> Home</button>

  <ng-container *ngIf="isAdmin()">
    <button mat-menu-item [matMenuTriggerFor]="menuUsers"><mat-icon>group</mat-icon> Usuarios</button>
    <button mat-menu-item [matMenuTriggerFor]="menuCategory"><mat-icon>category</mat-icon> Categorías</button>
    <button mat-menu-item [matMenuTriggerFor]="menuRole"><mat-icon>admin_panel_settings</mat-icon> Roles</button>
    <button mat-menu-item [matMenuTriggerFor]="menuProduct"><mat-icon>shopping_bag</mat-icon> Productos</button>
    <button mat-menu-item [matMenuTriggerFor]="menuSpeciality"><mat-icon>medical_services</mat-icon> Especialidades</button>
    <button mat-menu-item [matMenuTriggerFor]="menuQuestion"><mat-icon>question_answer</mat-icon> Preguntas</button>
    <button mat-menu-item [matMenuTriggerFor]="menuAnswer"><mat-icon>reply</mat-icon> Respuestas</button>
    <button mat-menu-item [matMenuTriggerFor]="menuShopping"><mat-icon>shopping_cart</mat-icon> Compras</button>
    <button mat-menu-item [matMenuTriggerFor]="menuShoppingDetail"><mat-icon>receipt_long</mat-icon> Detalles de Compras</button>
  </ng-container>

  <ng-container *ngIf="isProfesional()">
    <button mat-menu-item [matMenuTriggerFor]="menuHealthObjective"><mat-icon>fitness_center</mat-icon> Objetivos de Salud</button>
    <button mat-menu-item [matMenuTriggerFor]="menuMonitoring"><mat-icon>track_changes</mat-icon> Seguimientos</button>
    <button mat-menu-item [matMenuTriggerFor]="menuQuestion"><mat-icon>question_answer</mat-icon> Preguntas</button>
  </ng-container>

  <ng-container *ngIf="isCliente()">
    <button mat-menu-item [matMenuTriggerFor]="menuHealthObjective"><mat-icon>fitness_center</mat-icon> Objetivos de Salud</button>
    <button mat-menu-item [matMenuTriggerFor]="menuShopping"><mat-icon>shopping_cart</mat-icon> Compras</button>
    <button mat-menu-item [matMenuTriggerFor]="menuShoppingDetail"><mat-icon>receipt_long</mat-icon> Detalles de Compras</button>
    <button mat-menu-item [matMenuTriggerFor]="menuReview"><mat-icon>rate_review</mat-icon> Reseñas</button>
    <button mat-menu-item [matMenuTriggerFor]="menuAnswer"><mat-icon>reply</mat-icon> Respuestas</button>
    <button mat-menu-item [matMenuTriggerFor]="menuRecommendation"><mat-icon>recommend</mat-icon> Recomendaciones</button>
  </ng-container>

  <button mat-menu-item [matMenuTriggerFor]="menuSalir"><mat-icon>person</mat-icon> Perfil</button>
</mat-menu>

<!-- SUBMENÚS -->
<mat-menu #menuUsers="matMenu">
  <button mat-menu-item routerLink="/usuarios">Listar Usuarios</button>
  <button mat-menu-item routerLink="/usuarios/nuevo">Registrar Usuarios</button>
</mat-menu>
<mat-menu #menuCategory="matMenu">
  <button mat-menu-item routerLink="/categorias">Listar Categorías</button>
  <button mat-menu-item routerLink="/categorias/nuevo">Registrar Categorías</button>
</mat-menu>
<mat-menu #menuRole="matMenu">
  <button mat-menu-item routerLink="/roles">Listar Roles</button>
  <button mat-menu-item routerLink="/roles/nuevo">Registrar Roles</button>
</mat-menu>
<mat-menu #menuProduct="matMenu">
  <button mat-menu-item routerLink="/productos">Listar Productos</button>
  <button mat-menu-item routerLink="/productos/nuevo">Registrar Productos</button>
</mat-menu>
<mat-menu #menuSpeciality="matMenu">
  <button mat-menu-item routerLink="/especialidades">Listar Especialidades</button>
  <button mat-menu-item routerLink="/especialidades/nuevo">Registrar Especialidades</button>
</mat-menu>
<mat-menu #menuHealthObjective="matMenu">
  <button mat-menu-item routerLink="/objetivo-de-salud">Listar Objetivos de Salud</button>
  <button mat-menu-item routerLink="/objetivo-de-salud/nuevo">Registrar Objetivos de Salud</button>
</mat-menu>
<mat-menu #menuMonitoring="matMenu">
  <button mat-menu-item routerLink="/seguimiento">Listar Seguimiento</button>
  <button mat-menu-item routerLink="/seguimiento/nuevo">Registrar Seguimiento</button>
</mat-menu>
<mat-menu #menuShopping="matMenu">
  <button mat-menu-item routerLink="/compras">Listar Compras</button>
  <button mat-menu-item routerLink="/compras/nuevo">Registrar Compras</button>
</mat-menu>
<mat-menu #menuShoppingDetail="matMenu">
  <button mat-menu-item routerLink="/detallesCompra">Listar Detalles de Compras</button>
  <button mat-menu-item routerLink="/detallesCompra/nuevo">Registrar Detalles de Compras</button>
</mat-menu>
<mat-menu #menuReview="matMenu">
  <button mat-menu-item routerLink="/resenias">Listar Reseñas</button>
  <button mat-menu-item routerLink="/resenias/nuevo">Registrar Reseñas</button>
</mat-menu>
<mat-menu #menuRecommendation="matMenu">
  <button mat-menu-item routerLink="/recomendaciones">Listar Recomendaciones</button>
  <button mat-menu-item routerLink="/recomendaciones/nuevo">Registrar Recomendaciones</button>
</mat-menu>
<mat-menu #menuQuestion="matMenu">
  <button mat-menu-item routerLink="/preguntas">Listar Preguntas</button>
  <button mat-menu-item routerLink="/preguntas/nuevo">Registrar Preguntas</button>
</mat-menu>
<mat-menu #menuAnswer="matMenu">
  <button mat-menu-item routerLink="/Respuesta">Listar Respuestas</button>
  <button mat-menu-item routerLink="/Respuesta/nuevo">Registrar Respuestas</button>
</mat-menu>
<mat-menu #menuSalir="matMenu">
  <button mat-menu-item routerLink="/login" (click)="cerrar()">
    <mat-icon>logout</mat-icon>
    <span>Cerrar sesión</span>
  </button>
  <button mat-menu-item disabled>
    Rol: <span>{{ role }}</span>
  </button>
</mat-menu>

<router-outlet></router-outlet>
